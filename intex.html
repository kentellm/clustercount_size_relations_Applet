<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Math Relationship Tester</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <h2>Natural Log Relationship Tester</h2>

  <!-- N INPUT -->
  <div class="row">
    <label>N (0–30)</label><br>
    <input id="nSlider" type="range" min="0" max="30" value="1">
    <input id="nInput" type="number" min="0" max="30" value="1">
  </div>

  <!-- AVERAGE SIZE INPUT -->
  <div class="row">
    <label>Average Size (0–300000)</label><br>
    <input id="avgSlider" type="range" min="0" max="300000" value="1000">
    <input id="avgInput" type="number" min="0" max="300000" value="1000">
  </div>

  <!-- OUTPUT -->
  <div class="row">
    <label>Output: ln(avg / N)</label>
    <div id="output" class="output-box">—</div>
  </div>

  <!-- PLOT -->
  <canvas id="plotCanvas" width="600" height="400"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
